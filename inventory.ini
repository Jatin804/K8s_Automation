# Its a example config, Edit accordingly
[masters]
k8s-master ansible_host=192.168.134.133 ansible_user=master

[workers]
k8s-worker-1 ansible_host=192.168.134.135 ansible_user=worker-1

[k8s_cluster:children]
masters
workers

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/id_ed25519
# HostKeyChecking is already in your ansible.cfg, but keeping it here is type of safe backup option.
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
# for master and workers, backup for all
pod_network_cidr = 192.168.0.0/16
